x-worker: &worker
  image: kojin-examples
  build: .
  environment:
    REDIS_URL: redis://redis:6379
    RUST_LOG: info

x-producer: &producer
  image: kojin-examples
  build: .
  entrypoint: [kojin-producer]
  environment:
    REDIS_URL: redis://redis:6379
    RUST_LOG: info

services:
  # --- Infrastructure (always on) ---

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Base worker (for basic/priority/dashboard profiles) ---

  worker:
    <<: *worker
    profiles: [basic, priority, dashboard]
    deploy:
      replicas: 3
    depends_on:
      redis:
        condition: service_healthy

  # --- Profile: basic (fan-out demo) ---

  producer-basic:
    <<: *producer
    profiles: [basic]
    environment:
      REDIS_URL: redis://redis:6379
      SCENARIO: basic
      RUST_LOG: info
    depends_on:
      worker:
        condition: service_started

  # --- Profile: chord (workflow + Postgres result backend) ---

  postgres:
    image: postgres:16-alpine
    profiles: [chord]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kojin
      POSTGRES_USER: kojin
      POSTGRES_PASSWORD: kojin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kojin"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker-pg:
    <<: *worker
    profiles: [chord]
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://kojin:kojin@postgres:5432/kojin
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  producer-chord:
    <<: *producer
    profiles: [chord]
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://kojin:kojin@postgres:5432/kojin
      SCENARIO: chord
      RUST_LOG: info
    depends_on:
      worker-pg:
        condition: service_started
      postgres:
        condition: service_healthy

  # --- Profile: priority (weighted queues demo) ---

  producer-priority:
    <<: *producer
    profiles: [priority]
    environment:
      REDIS_URL: redis://redis:6379
      SCENARIO: priority
      RUST_LOG: info
    depends_on:
      worker:
        condition: service_started

  # --- Profile: amqp-priority (RabbitMQ message-level priority) ---

  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: [amqp-priority]
    ports:
      - "5672:5672"
      - "15672:15672"
    entrypoint: ["sh", "-c", "echo 'kojin' > /var/lib/rabbitmq/.erlang.cookie && chmod 600 /var/lib/rabbitmq/.erlang.cookie && exec rabbitmq-server"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer-amqp:
    image: kojin-examples
    build: .
    profiles: [amqp-priority]
    entrypoint: [kojin-producer-amqp]
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/%2f
      RUST_LOG: info
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker-amqp:
    image: kojin-examples
    build: .
    profiles: [amqp-priority]
    entrypoint: [kojin-worker-amqp]
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/%2f
      RUST_LOG: info
    depends_on:
      producer-amqp:
        condition: service_completed_successfully

  # --- Profile: dashboard (monitoring UI) ---

  worker-dashboard:
    <<: *worker
    profiles: [dashboard]
    environment:
      REDIS_URL: redis://redis:6379
      DASHBOARD: "1"
      DASHBOARD_PORT: "9090"
      RUST_LOG: info
    ports:
      - "9090:9090"
    depends_on:
      redis:
        condition: service_healthy

  # --- Profile: agent (AI agent orchestration) ---
  # Auth: uncomment ONE of the following in worker-agent:
  #   A. API key:  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  #   B. OAuth:    volumes: ["${HOME}/.claude/.credentials.json:/root/.claude/.credentials.json:ro"]

  worker-agent:
    image: kojin-examples
    build: .
    profiles: [agent]
    entrypoint: [kojin-worker-agent]
    environment:
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAX_CONCURRENT_AGENTS: "3"
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy

  producer-agent:
    image: kojin-examples
    build: .
    profiles: [agent]
    entrypoint: [kojin-producer-agent]
    environment:
      REDIS_URL: redis://redis:6379
      SCENARIO: single
      RUST_LOG: info
    depends_on:
      worker-agent:
        condition: service_started
