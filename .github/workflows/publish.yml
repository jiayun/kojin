name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "kojin") | .version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace

      - name: Publish kojin-core
        run: cargo publish -p kojin-core

      - name: Publish kojin-macros
        run: cargo publish -p kojin-macros

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish kojin-redis
        run: cargo publish -p kojin-redis

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish kojin
        run: cargo publish -p kojin
